{% extends "base.html" %}
{% block title %}Auto Groups · Djjio{% endblock %}
{% block page_title %}Auto Groups{% endblock %}

{% block extra_head %}
<style>
#content{overflow-y:auto;padding:24px}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.group-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.group-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.group-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.group-name{font-size:13px;font-weight:600;color:#fff}
.group-meta{font-size:11px;color:var(--muted);margin-left:auto}
.group-tracks{padding:8px 0}
.gt-row{display:flex;align-items:center;gap:10px;padding:7px 18px;cursor:pointer;transition:background .12s}
.gt-row:hover{background:var(--bg3)}
.gt-art{width:32px;height:32px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#111}
.gt-info{flex:1;min-width:0}
.gt-title{font-size:12px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gt-sub{font-size:10px;color:var(--muted)}
#no-groups{padding:40px;text-align:center;color:var(--muted);font-size:13px}
#no-groups code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:12px;color:#ccc}
</style>
{% endblock %}

{% block content %}
<div id="no-groups" style="display:none">
  No hay grupos todavía.<br>Ejecuta <code>python autogroup.py</code> y recarga.
</div>
<div class="groups-grid" id="groups-grid"></div>
{% endblock %}

{% block extra_js %}
<script>
const PALETTE=["#C8A951","#5B8FA8","#C4603A","#7B6BA8","#4E9E6E",
               "#A85B6B","#6B9E4E","#5B7BA8","#A87B3A","#6B5BA8"];

fetch('/api/library').then(r=>r.json()).then(lib=>{
  const byGroup={};
  lib.forEach((f,i)=>{
    if(f.group===undefined||f.group===null) return;
    if(!byGroup[f.group]) byGroup[f.group]=[];
    byGroup[f.group].push({...f,id:i});
  });
  const keys=Object.keys(byGroup).sort((a,b)=>+a-+b);
  if(!keys.length){
    document.getElementById('no-groups').style.display='block'; return;
  }
  const grid=document.getElementById('groups-grid');
  keys.forEach(g=>{
    const tracks=byGroup[g];
    const color=PALETTE[+g%PALETTE.length];
    const generos=[...new Set(tracks.map(t=>t.genero))].join(', ');
    const card=document.createElement('div');
    card.className='group-card';
    card.innerHTML='<div class="group-head" style="border-left:3px solid '+color+'">'
      +'<div class="group-dot" style="background:'+color+'"></div>'
      +'<div class="group-name">Grupo '+(+g+1)+'</div>'
      +'<div class="group-meta">'+tracks.length+' tracks</div></div>'
      +'<div style="padding:6px 18px 4px;font-size:10px;color:var(--muted)">'+generos+'</div>'
      +'<div class="group-tracks">'
      +tracks.slice(0,8).map(t=>
        '<div class="gt-row" data-id="'+t.id+'">'
        +'<img class="gt-art" src="'+(t.artwork||'')+'" alt="">'
        +'<div class="gt-info">'
          +'<div class="gt-title">'+(t.title||t.path.split('/').pop().replace(/\.[^.]+$/,''))+'</div>'
          +'<div class="gt-sub">'+(t.artist||t.genero)+' · '+Math.round(t.bpm)+' BPM · '+t.camelot+'</div>'
        +'</div></div>'
      ).join('')
      +(tracks.length>8?'<div style="padding:6px 18px;font-size:11px;color:var(--muted)">+'+( tracks.length-8)+' más</div>':'')
      +'</div>';
    card.querySelectorAll('.gt-row').forEach(row=>{
      const id=+row.dataset.id;
      const t=tracks.find(x=>x.id===id);
      if(t) row.addEventListener('click',()=>loadTrack(id,t.title||t.path.split('/').pop(),t.artist,t.artwork));
    });
    grid.appendChild(card);
  });
});
</script>
{% endblock %}
